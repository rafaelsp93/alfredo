services:
  alfredo:
    image: ghcr.io/rafaelsp93/alfredo:${IMAGE_TAG:-latest}
    container_name: alfredo
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - alfredo-data:/app/data
    environment:
      - APP_SERVER_HOST=0.0.0.0
      - APP_SERVER_PORT=8080
      - APP_DATABASE_PATH=/app/data/alfredo.db
      - APP_WEBHOOK_BASE_URL=${APP_WEBHOOK_BASE_URL:-}
      - APP_AUTH_API_KEY=${APP_AUTH_API_KEY}
      - APP_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  alfredo-data:
    driver: local
